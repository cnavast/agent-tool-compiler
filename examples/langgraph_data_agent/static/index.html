<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ATC Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #191b1f;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 18px;
      }
      header {
        margin-bottom: 22px;
      }
      h1 {
        margin: 0;
        font-size: 32px;
        letter-spacing: 0;
      }
      header p {
        margin: 6px 0 0;
        color: #575d68;
      }
      #messages {
        display: grid;
        gap: 12px;
        margin-bottom: 16px;
      }
      .message,
      .compile-card {
        background: #ffffff;
        border: 1px solid #dfe3ea;
        border-radius: 8px;
        padding: 14px 16px;
        box-shadow: 0 1px 2px rgba(21, 26, 36, 0.04);
      }
      .message.user {
        background: #e9f1ff;
        border-color: #c8daf8;
      }
      .label {
        display: block;
        margin-bottom: 6px;
        color: #646b76;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      form {
        display: flex;
        gap: 10px;
      }
      input {
        flex: 1;
        min-width: 0;
        border: 1px solid #cfd5df;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 16px;
        background: #ffffff;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        min-height: 44px;
        background: #1f6feb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        cursor: progress;
        opacity: 0.55;
      }
      .compile-card {
        display: grid;
        gap: 8px;
      }
      .metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: #4d5561;
        font-size: 14px;
      }
      .metrics span {
        background: #f1f3f6;
        border-radius: 999px;
        padding: 5px 9px;
      }
      .content {
        line-height: 1.5;
      }
      .content p {
        margin: 0 0 10px;
      }
      .content p:last-child,
      .content ul:last-child,
      .content ol:last-child,
      .content pre:last-child,
      .content .table-wrap:last-child {
        margin-bottom: 0;
      }
      .content ul,
      .content ol {
        margin: 0 0 10px;
        padding-left: 24px;
      }
      .content li {
        margin: 4px 0;
      }
      .content h1,
      .content h2,
      .content h3,
      .content h4 {
        margin: 14px 0 8px;
        font-size: 16px;
        line-height: 1.3;
        letter-spacing: 0;
      }
      .content h1:first-child,
      .content h2:first-child,
      .content h3:first-child,
      .content h4:first-child {
        margin-top: 0;
      }
      .content code {
        background: #eef1f5;
        border-radius: 4px;
        padding: 1px 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.92em;
      }
      .content pre {
        background: #111827;
        color: #f9fafb;
        border-radius: 8px;
        padding: 12px;
        margin: 0 0 10px;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      .content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }
      .table-wrap {
        overflow-x: auto;
        margin: 0 0 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th,
      td {
        border: 1px solid #dfe3ea;
        padding: 7px 9px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: #f1f3f6;
        font-weight: 700;
      }
      @media (max-width: 640px) {
        form {
          flex-direction: column;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>ATC — Agent Tool Compiler</h1>
        <p>Agents shouldn’t solve the same workflow twice.</p>
      </header>
      <section id="messages"></section>
      <form id="chat-form">
        <input
          id="message-input"
          autocomplete="off"
          value="What carriers had the most delays yesterday in Italy?"
        />
        <button id="send-button" type="submit">Send</button>
      </form>
    </main>
    <script src="/static/app.js?v=3"></script>
  </body>
</html>
